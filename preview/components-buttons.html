<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #fff; padding: 24px; }
.row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
.label { font-size: 10px; font-weight: 500; color: #8E8E93; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.btn { height: 32px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 6px; padding: 0 14px; }
.btn-primary { background: #2EB273; color: #fff; box-shadow: 0px 4px 10px -2px rgba(20,78,50,0.05),0px 2px 2px -1px rgba(20,78,50,0.10),0px -1px 4px 0px rgba(0,0,0,0.05); }
.btn-secondary { background: #fff; color: #292D32; box-shadow: 0px 0px 2px 0px #E0E0E0,0px 1px 4px -2px rgba(24,39,75,0.02),0px 4px 4px -2px rgba(24,39,75,0.06); }
.btn-ghost { background: transparent; color: #656669; border: 1px solid #EEF0F1; }
.btn-danger { background: #FDECEA; color: #CC3333; }
.btn-sm { height: 28px; font-size: 12px; padding: 0 10px; }
.btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }
svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style></head><body>
<div class="label">Primary</div>
<div class="row">
  <button class="btn btn-primary">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add
  </button>
  <button class="btn btn-primary">Save</button>
  <button class="btn btn-primary">Submit</button>
</div>
<div class="label">Secondary</div>
<div class="row">
  <button class="btn btn-secondary">Actions</button>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-secondary">
    <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    Filter
  </button>
  <button class="btn btn-secondary">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Search
  </button>
</div>
<div class="label">Ghost / Danger</div>
<div class="row">
  <button class="btn btn-ghost">View</button>
  <button class="btn btn-danger">Delete</button>
  <button class="btn btn-secondary btn-sm">Export</button>
  <button class="btn btn-primary btn-sm">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add
  </button>
</div>
</body></html>
