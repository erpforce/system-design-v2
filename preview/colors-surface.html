<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fff;
    color: #1F2125;
    padding: 24px;
    letter-spacing: -0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .swatch {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chip {
    width: 44px;
    height: 44px;
    border-radius: 4px;
    flex-shrink: 0;
    border: 1px solid #F0F0F0;
  }
  .meta {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .name {
    font-size: 12px;
    font-weight: 500;
    color: #1F2125;
    line-height: 1.3;
  }
  .hex {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #8E8E93;
    letter-spacing: 0;
    line-height: 1.3;
    margin-top: 2px;
  }
</style></head><body>

  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background:#FFFFFF"></div>
      <div class="meta"><span class="name">Background</span><span class="hex">#FFFFFF</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#FBFBFB"></div>
      <div class="meta"><span class="name">Sidebar</span><span class="hex">#FBFBFB</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#F5F6F5"></div>
      <div class="meta"><span class="name">Subtle</span><span class="hex">#F5F6F5</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#F5F6F5;border-color:#F5F6F5"></div>
      <div class="meta"><span class="name">Border</span><span class="hex">#F5F6F5</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#EEF0F1;border-color:#EEF0F1"></div>
      <div class="meta"><span class="name">Border&nbsp;mid</span><span class="hex">#EEF0F1</span></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#E0E0E0;border-color:#E0E0E0"></div>
      <div class="meta"><span class="name">Border&nbsp;strong</span><span class="hex">#E0E0E0</span></div>
    </div>
  </div>

</body></html>
