<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #F4F5F6;
    color: #1F2125;
    padding: 16px;
    letter-spacing: -0.02em;
    display: flex;
    justify-content: center;
  }
  .sidebar {
    width: 260px;
    height: 760px;
    background: #FBFBFB;
    border: 1px solid #ECEDEF;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  /* L1 */
  .item {
    height: 36px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    border-radius: 6px;
    cursor: pointer;
    color: #1F2125;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.02em;
    user-select: none;
  }
  .item:hover { background: #F2F3F4; }
  .item.active { background: #EBF9F2; color: #2EB273; }
  .item.active .ic { color: #2EB273; }
  .item.parent-active { color: #2EB273; }
  .item.parent-active .ic { color: #2EB273; }

  .ic {
    width: 16px; height: 16px;
    color: #4A4C50;
    flex-shrink: 0;
    display: flex;
  }
  .label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chev {
    width: 12px; height: 12px;
    color: #B0B2B4;
    flex-shrink: 0;
    transition: transform 0.18s ease;
  }
  .chev.open { transform: rotate(180deg); color: #2EB273; }

  /* L2 children — guide aligns with L1 icon center (10px padding + 8px icon-half = 18px) */
  .children {
    position: relative;
    margin: 1px 0 2px 0;
    padding-left: 26px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .children::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 0;
    bottom: 0;
    width: 1.5px;
    background: #E0E2E4;
    border-radius: 1px;
  }
  .child {
    position: relative;
    height: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    border-radius: 6px;
    cursor: pointer;
    color: #4A4C50;
    font-size: 12.5px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .child::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 50%;
    width: 8px;
    height: 1.5px;
    background: #E0E2E4;
    border-radius: 1px;
  }
  .child:hover { background: #F2F3F4; color: #1F2125; }
  .child.active {
    background: #EBF9F2;
    color: #2EB273;
    font-weight: 500;
  }
  .child.active::before { background: #2EB273; }
  .child .child-chev {
    width: 10px; height: 10px;
    color: #B0B2B4;
    flex-shrink: 0;
    transition: transform 0.18s ease;
    margin-left: auto;
  }
  .child .child-chev.open { transform: rotate(90deg); color: #2EB273; }
  .child .child-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* L3 grandchildren — nested, slimmer guide */
  .grand {
    position: relative;
    margin: 1px 0 2px 12px;
    padding-left: 14px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .grand::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 1.5px;
    background: #ECEDEF;
    border-radius: 1px;
  }
  .grand-row {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    border-radius: 6px;
    cursor: pointer;
    color: #656669;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.02em;
    gap: 8px;
  }
  .grand-row::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 50%;
    width: 8px;
    height: 1.5px;
    background: #ECEDEF;
    border-radius: 1px;
  }
  .grand-row:hover { background: #F2F3F4; color: #1F2125; }
  .grand-row.active {
    background: #EBF9F2;
    color: #2EB273;
    font-weight: 500;
  }
  .grand-row.active::before { background: #2EB273; }
  .grand-row .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #C8CACC;
    flex-shrink: 0;
  }
  .grand-row.active .dot { background: #2EB273; }

  .footer {
    height: 44px;
    border-top: 1px solid #ECEDEF;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 11.5px;
    color: #8E8E93;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }
</style>
</head>
<body>

  <div class="sidebar">
    <div class="nav">

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg></span>
        <span class="label">Dashboard</span>
      </div>

      <div class="item parent-active">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="13" height="18" rx="2"/><path d="M8 3v2a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V3"/><path d="M17 7h2a1 1 0 0 1 1 1v12a2 2 0 0 1-2 2H8"/></svg></span>
        <span class="label">Organization Structure</span>
        <svg class="chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="children">
        <div class="child"><span class="child-label">Hierarchy</span></div>
        <div class="child"><span class="child-label">Department Master</span></div>
        <div class="child"><span class="child-label">Designation Master</span></div>
        <div class="child">
          <span class="child-label">Company Policy</span>
          <svg class="child-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="grand">
          <div class="grand-row active"><span class="dot"></span>Document Master</div>
          <div class="grand-row"><span class="dot"></span>Accruals &amp; Benefits</div>
          <div class="grand-row"><span class="dot"></span>Salary Structure</div>
          <div class="grand-row"><span class="dot"></span>Leave Policy</div>
        </div>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></span>
        <span class="label">Time Tracking</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="11" r="2.2"/><line x1="14" y1="9" x2="18" y2="9"/><line x1="14" y1="13" x2="18" y2="13"/><path d="M6 17.5c.6-1.6 1.8-2.5 3-2.5s2.4.9 3 2.5"/></svg></span>
        <span class="label">Employee Management</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5V4a2 2 0 0 1 2-2h13v17H6a2 2 0 0 0-2 2.5z"/><path d="M6 19h13"/></svg></span>
        <span class="label">Asset Management</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><polyline points="9.5 12 11.5 14 15 10.5"/></svg></span>
        <span class="label">Approval Dashboard</span>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="9" r="4"/><path d="M3 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 4.5 2"/><circle cx="18.5" cy="18.5" r="3.5"/><line x1="18.5" y1="17" x2="18.5" y2="20"/><line x1="17" y1="18.5" x2="20" y2="18.5"/></svg></span>
        <span class="label">Recruitment</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="14" height="11" rx="2"/><path d="M17 9h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-2"/><circle cx="9" cy="10" r="1"/><circle cx="13" cy="10" r="1"/><path d="M8 13c.7.6 1.7 1 3 1s2.3-.4 3-1"/></svg></span>
        <span class="label">Onboarding</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

      <div class="item">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="label">Leaves</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

    </div>

    <div class="footer">
      <span>Crafted with</span>
      <span style="color:#E25563;font-size:12px">♥</span>
      <span style="font-weight:600;color:#2EB273">ERP</span><span style="font-weight:600;color:#001866;margin-left:-2px">Force</span>
    </div>
  </div>

</body>
</html>
