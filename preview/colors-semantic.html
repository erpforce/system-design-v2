<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fff;
    color: #1F2125;
    padding: 24px;
    letter-spacing: -0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border: 1px solid #F5F6F5;
    border-radius: 4px;
    background: #fff;
  }
  .swatch {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 15px;
    letter-spacing: -0.01em;
  }
  .meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .name { font-size: 13px; font-weight: 600; color: #1F2125; line-height: 1; }
  .tokens { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #8E8E93; letter-spacing: 0; line-height: 1.3; }
  .right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
</style></head><body>

  <div class="grid">

    <div class="row">
      <div class="swatch" style="background:#E8F5F0">
        <span class="badge" style="background:#D6F3E5;color:#2EB273">Active</span>
      </div>
      <div class="meta">
        <span class="name">Success</span>
        <span class="tokens">#2EB273 · #E8F5F0</span>
      </div>
    </div>

    <div class="row">
      <div class="swatch" style="background:#E8F2FB">
        <span class="badge" style="background:#CDE3F4;color:#006699">Pending</span>
      </div>
      <div class="meta">
        <span class="name">Info</span>
        <span class="tokens">#0099CC · #CDE3F4</span>
      </div>
    </div>

    <div class="row">
      <div class="swatch" style="background:#FFF8E0">
        <span class="badge" style="background:#FFF3CC;color:#CC9900">Draft</span>
      </div>
      <div class="meta">
        <span class="name">Warning</span>
        <span class="tokens">#CC9900 · #FFF3CC</span>
      </div>
    </div>

    <div class="row">
      <div class="swatch" style="background:#FDECEA">
        <span class="badge" style="background:#FFCDD2;color:#CC3333">Rejected</span>
      </div>
      <div class="meta">
        <span class="name">Error</span>
        <span class="tokens">#E53935 · #FFEBEE</span>
      </div>
    </div>

  </div>

</body></html>
