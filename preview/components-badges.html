<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #fff; padding: 24px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.label { font-size: 10px; font-weight: 500; color: #8E8E93; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 12px; font-weight: 500; letter-spacing: -0.01em; }
.b-active   { background:#D6F3E5; color:#2EB273; }
.b-inactive { background:#F3F2F2; color:#656669; }
.b-draft    { background:#FFF3CC; color:#CC9900; }
.b-pending  { background:#CDE3F4; color:#006699; }
.b-error    { background:#FDECEA; color:#CC3333; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.bc-item { color: #656669; }
.bc-sep { color: #A7A8A9; }
.bc-active { color: #1F2125; font-weight: 500; }
.avatar { width: 32px; height: 32px; border-radius: 8px; background: #F6DEE8; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #6F065D; }
</style></head><body>
<div class="label">Status Badges</div>
<div class="row">
  <span class="badge b-active">Active</span>
  <span class="badge b-inactive">Inactive</span>
  <span class="badge b-draft">Draft</span>
  <span class="badge b-pending">Pending</span>
  <span class="badge b-error">Rejected</span>
</div>
<div class="label">Breadcrumb</div>
<div class="row">
  <div class="breadcrumb">
    <span class="bc-item">Document Master</span>
    <span class="bc-sep">/</span>
    <span class="bc-active">Add New Document</span>
  </div>
</div>
<div class="label">Avatar</div>
<div class="row">
  <div class="avatar">AS</div>
  <div class="avatar" style="background:#E8F0F6;color:#005C99">JD</div>
  <div class="avatar" style="background:#F0EBF9;color:#5C0099">MR</div>
  <div style="margin-left:8px;font-size:12px;color:#656669">Amrit Sunari · Admin</div>
</div>
</body></html>
