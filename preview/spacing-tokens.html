<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #fff; padding: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.section { margin-bottom: 14px; }
.label { font-size: 10px; font-weight: 500; color: #8E8E93; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.tokens { display: flex; flex-direction: column; gap: 6px; }
.token { display: flex; align-items: center; gap: 10px; }
.bar { background: #2EB273; border-radius: 2px; height: 14px; }
.token-meta { font-size: 11px; color: #656669; min-width: 80px; }
.token-val { font-size: 10px; color: #A7A8A9; font-family: monospace; }

.radii { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.radius-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.radius-box { width: 40px; height: 40px; background: #EBF9F2; border: 1.5px solid #2EB273; }
.radius-label { font-size: 10px; color: #8E8E93; text-align: center; }
.radius-val { font-size: 9px; color: #A7A8A9; font-family: monospace; }
</style></head><body>
<div class="grid">
  <div class="section">
    <div class="label">Spacing Scale</div>
    <div class="tokens">
      <div class="token"><div class="bar" style="width:4px"></div><div class="token-meta">space-1</div><div class="token-val">4px</div></div>
      <div class="token"><div class="bar" style="width:8px"></div><div class="token-meta">space-2</div><div class="token-val">8px</div></div>
      <div class="token"><div class="bar" style="width:12px"></div><div class="token-meta">space-3</div><div class="token-val">12px</div></div>
      <div class="token"><div class="bar" style="width:16px"></div><div class="token-meta">space-4</div><div class="token-val">16px</div></div>
      <div class="token"><div class="bar" style="width:24px"></div><div class="token-meta">space-6</div><div class="token-val">24px</div></div>
      <div class="token"><div class="bar" style="width:32px"></div><div class="token-meta">space-8</div><div class="token-val">32px</div></div>
      <div class="token"><div class="bar" style="width:56px"></div><div class="token-meta">space-14</div><div class="token-val">56px (bar)</div></div>
    </div>
  </div>
  <div>
    <div class="section">
      <div class="label">Border Radius</div>
      <div class="radii">
        <div class="radius-item"><div class="radius-box" style="border-radius:2px"></div><div class="radius-label">sm</div><div class="radius-val">2px</div></div>
        <div class="radius-item"><div class="radius-box" style="border-radius:4px"></div><div class="radius-label">default</div><div class="radius-val">4px</div></div>
        <div class="radius-item"><div class="radius-box" style="border-radius:8px"></div><div class="radius-label">md</div><div class="radius-val">8px</div></div>
        <div class="radius-item"><div class="radius-box" style="border-radius:15px;width:50px;height:26px"></div><div class="radius-label">pill</div><div class="radius-val">15px</div></div>
      </div>
    </div>
  </div>
</div>
</body></html>
